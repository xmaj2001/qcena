services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      - api-01
      - api-02
    networks:
      - default

  api-01:
    build: ./api
    container_name: api-01
    volumes:
      - ./api:/app
      - /app/node_modules
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  api-02:
    build: ./api
    container_name: api-02
    volumes:
      - ./api:/app
      - /app/node_modules
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7
    container_name: redis
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  postgres:
    image: postgres:15
    container_name: postgres
    env_file:
      - .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
