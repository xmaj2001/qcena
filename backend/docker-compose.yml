  # ─────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────
  # postgresql:
  #   image: postgres:16-alpine
  #   container_name: qcena_postgres
  #   restart: unless-stopped
  #   env_file:
  #     - ./backend/.env
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   expose:
  #     - "5432"
  #   ports:
  #     - 5432:5432
  #   # networks:
  #   #   - keymura
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "pg_isready -U ${DB_USER:-qcena_user} -d ${DB_NAME:-qcena_db}",
  #       ]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  backend:
    build: ./api
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./api/.env
    expose:
      - "5002"
    ports:
      - 5002:5002
      - 5555:5555
    depends_on:
      # postgresql:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - keymura
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  # ─────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qcena_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    ports:
      - 6380:6379
    networks:
      - keymura
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ─────────────────────────────────────────
# VOLUMES & NETWORK
# ─────────────────────────────────────────
volumes:
  # postgres_data:
  #   driver: local
  redis_data:
    driver: local

networks:
  keymura:
    driver: bridge
